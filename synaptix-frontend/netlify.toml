[build]
  publish = "."
  command = "echo 'Static site - no build needed'"

[[redirects]]
  from = "/api/*"
  to = "https://synaptix-website2-1.onrender.com/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/payment/success"
  to = "/products.html"
  status = 200

[[redirects]]
  from = "/payment/failed"
  to = "/products.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
